<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Paper background -->
  <rect width="1200" height="630" fill="#F8F5EE"/>

  <!-- Subtle horizontal scanline texture -->
  <defs>
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="3" fill="#F8F5EE"/>
      <rect width="4" height="1" y="3" fill="#181613" opacity="0.012"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grain)"/>

  <!-- Top hairline rule -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#E2DCCC" stroke-width="1"/>

  <!-- Mono small caps label, top -->
  <text x="80" y="68"
    font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace"
    font-size="13"
    letter-spacing="2.4"
    fill="#8A847A">DOMINICKAMIRR.COM</text>

  <text x="1120" y="68"
    font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace"
    font-size="13"
    letter-spacing="2.4"
    fill="#8A847A"
    text-anchor="end">FOLIO No. 01</text>

  <!-- Epigraph -->
  <text x="80" y="220"
    font-family="'Instrument Serif', 'Times New Roman', Georgia, serif"
    font-size="42"
    font-style="italic"
    fill="#6B1A14"
    letter-spacing="-0.4">"Allergic to dashboards that tie out to nothing."</text>

  <!-- Main name / display heading -->
  <text x="80" y="380"
    font-family="'Instrument Serif', 'Times New Roman', Georgia, serif"
    font-size="120"
    fill="#181613"
    letter-spacing="-3">Dominick Amirr</text>

  <!-- Lede description -->
  <text x="80" y="450"
    font-family="-apple-system, 'Inter', sans-serif"
    font-size="22"
    fill="#5A544C"
    letter-spacing="-0.2">Engineer building agents for finance systems.</text>

  <text x="80" y="482"
    font-family="-apple-system, 'Inter', sans-serif"
    font-size="22"
    fill="#5A544C"
    letter-spacing="-0.2">Currents Consulting · Abacus · DualEntry · Ascent.</text>

  <!-- Bottom hairline rule -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#E2DCCC" stroke-width="1"/>

  <!-- Bottom mono labels -->
  <text x="80" y="585"
    font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace"
    font-size="13"
    letter-spacing="2.4"
    fill="#8A847A">BROOKLYN, NY</text>

  <text x="1120" y="585"
    font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace"
    font-size="13"
    letter-spacing="2.4"
    fill="#8A847A"
    text-anchor="end">SET IN INSTRUMENT SERIF &amp; INTER</text>

  <!-- Oxblood D mark, top right of name area -->
  <g transform="translate(1040, 290)">
    <rect x="0" y="0" width="60" height="60" rx="6" fill="#6B1A14"/>
    <text x="31" y="46"
      font-family="'Instrument Serif', 'Times New Roman', Georgia, serif"
      font-size="46"
      font-style="italic"
      fill="#F8F5EE"
      text-anchor="middle">D</text>
  </g>
</svg>
