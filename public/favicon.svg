<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Aperture D — single-color geometric mark, transparent background.
       Adapts to light/dark via prefers-color-scheme. -->
  <style>
    .mark { fill: #1A1714; }
    @media (prefers-color-scheme: dark) {
      .mark { fill: #F8F5EE; }
    }
  </style>
  <path
    class="mark"
    fill-rule="evenodd"
    d="M6 4 H14.5 A12 12 0 0 1 14.5 28 H6 Z M19.5 16 A3.5 3.5 0 1 1 12.5 16 A3.5 3.5 0 1 1 19.5 16 Z"
  />
</svg>
